# Data catalog template for ETHUSDC_BotV3_Hermes.
# This file contains no raw market data, no secrets, no download state,
# no fake report results, and no candidate adoption claim.

schema_version = 1
template = true

[project]
symbol = "ETHUSDC"
quote_asset = "USDC"
base_asset = "ETH"
exchange = "binance"
market_type = "spot"
position_mode = "long_only"
training_days = 730
blindtest_days = 365
required_ethusdc_utc_days = 1095
context_symbols = ["BTCUSDC", "ETHBTC"]

[raw_data_policy]
raw_data_location = "outside_repository"
repository_raw_data_allowed = false
example_local_root = "C:/TradingBot/data/ETHUSDC_BotV3_Hermes"

[[sources]]
