name: Apply review fixes

on:
  push:
    branches:
      - "review/pr4-final-alignment"
    paths:
      - ".github/workflows/apply-review-fixes.yml"
      - "tools/apply_review_fixes.py"
      - "src/ethusdc_bot/path_safety.py"
      - "tests/unit/test_path_safety.py"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout review branch
        uses: actions/checkout@v4
        with:
          ref: review/pr4-final-alignment
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply deterministic source patches
        run: python tools/apply_review_fixes.py

      - name: Validate patched files
        run: |
          python -m compileall -q src
          git diff --check

      - name: Commit applied fixes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No patch changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ethusdc_bot/config/schema.py \
                  src/ethusdc_bot/data_pipeline/raw_data_contract.py \
                  src/ethusdc_bot/data_pipeline/catalog_schema.py
          git commit -m "Fix cross-platform path validation and target schema"
          git push origin HEAD:review/pr4-final-alignment
