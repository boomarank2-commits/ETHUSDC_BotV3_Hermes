name: Apply context simulator core

# One-shot workflow. Removed after the generated commit is verified.
on:
  push:
    branches:
      - "review/context-veto-engine-v1"
    paths:
      - ".github/workflows/apply-context-simulator-core.yml"
      - "tools/patch_context_simulator_core.py"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: review/context-veto-engine-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/patch_context_simulator_core.py
      - run: python -m compileall -q src && git diff --check
      - name: Commit simulator core
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ethusdc_bot/backtest/simulator.py
          git commit -m "Prepare simulator for aligned market context"
          git push origin HEAD:review/context-veto-engine-v1
