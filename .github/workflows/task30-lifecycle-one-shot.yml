name: Task 30 lifecycle states one-shot

on:
  push:
    branches:
      - codex/research-resume-and-ui-state-v1
    paths:
      - .github/workflows/task30-lifecycle-one-shot.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/research-resume-and-ui-state-v1
          fetch-depth: 0
      - name: Connect complete lifecycle and report-open states
        shell: python
        run: |
          from pathlib import Path

          state_path = Path("src/ethusdc_bot/ui/protocol_v3_operator_state.py")
          state = state_path.read_text(encoding="utf-8")
          state_replacements = [
              (
                  "from ethusdc_bot.protocol_v3.run_identity import (\n    FrozenExchangeInfoSnapshot,\n    validate_exchange_info_snapshot,\n)\n",
                  "from ethusdc_bot.protocol_v3.run_identity import (\n    FrozenExchangeInfoSnapshot,\n    validate_exchange_info_snapshot,\n)\nfrom ethusdc_bot.ui.protocol_v3_lifecycle_status import (\n    ProtocolV3LifecycleStatus,\n    build_protocol_v3_lifecycle_status,\n    validate_protocol_v3_lifecycle_status,\n)\n",
              ),
              (
                  "    exchange_info_snapshot: FrozenExchangeInfoSnapshot | None = None,\n    resume_worker_available: bool = False,\n    ui_runtime_blockers: Sequence[str] = (),\n",
                  "    exchange_info_snapshot: FrozenExchangeInfoSnapshot | None = None,\n    lifecycle_status: ProtocolV3LifecycleStatus | None = None,\n    resume_worker_available: bool = False,\n    report_open_available: bool = False,\n    ui_runtime_blockers: Sequence[str] = (),\n",
              ),
              (
                  "    if type(resume_worker_available) is not bool:\n        raise ProtocolV3OperatorStateError(\n            \"resume_worker_available must be a strict boolean\"\n        )\n",
                  "    if type(resume_worker_available) is not bool:\n        raise ProtocolV3OperatorStateError(\n            \"resume_worker_available must be a strict boolean\"\n        )\n    if type(report_open_available) is not bool:\n        raise ProtocolV3OperatorStateError(\n            \"report_open_available must be a strict boolean\"\n        )\n    lifecycle = validate_protocol_v3_lifecycle_status(\n        lifecycle_status or build_protocol_v3_lifecycle_status()\n    ).to_dict()\n",
              ),
              (
                  "    worker = _worker_status(worker_status)\n    refit_summary = _refit_summary(refit, now)\n",
                  "    worker = _worker_status(worker_status)\n    refit_summary = _refit_summary(refit, now, lifecycle[\"current_refit\"])\n",
              ),
              (
                  "    resume_enabled = not resume_blockers\n    operator_mode = _operator_mode(\n",
                  "    resume_enabled = not resume_blockers\n    report_open_blockers: list[str] = []\n    if report is None:\n        report_open_blockers.append(\"validated_task29_report_missing\")\n    if not report_open_available:\n        report_open_blockers.append(\"report_open_action_missing\")\n    report_open_enabled = not report_open_blockers\n    operator_mode = _operator_mode(\n",
              ),
              (
                  '        "data_status": data,\n        "research_progress": progress,\n',
                  '        "data_status": data,\n        "lifecycle_status": lifecycle,\n        "research_progress": progress,\n',
              ),
              (
                  '            "challenger_stop": _button(\n                stop_enabled,\n                [] if stop_enabled else ["research_challenger_worker_not_running"],\n            ),\n',
                  '            "challenger_stop": _button(\n                stop_enabled,\n                [] if stop_enabled else ["research_challenger_worker_not_running"],\n            ),\n            "challenger_report_open": _button(\n                report_open_enabled, report_open_blockers\n            ),\n',
              ),
              (
                  '            "protocol_v3_final_status": False,\n            "next_month_anchor_utc": next_anchor,\n',
                  '            "protocol_v3_final_status": False,\n            "process_oos_status": lifecycle["process_oos"],\n            "final_window_status": lifecycle["final_window"],\n            "canonical_shadow_status": lifecycle["canonical_shadow"],\n            "next_month_anchor_utc": next_anchor,\n',
              ),
              (
                  "def _refit_summary(refit: dict[str, Any] | None, now: datetime) -> dict[str, Any]:\n    if refit is None:\n        return {\n            \"status\": \"MISSING\",\n",
                  "def _refit_summary(\n    refit: dict[str, Any] | None, now: datetime, runtime_status: str\n) -> dict[str, Any]:\n    if refit is None:\n        return {\n            \"status\": runtime_status,\n",
              ),
              (
                  "    if worker[\"phase\"] in ACTIVE_WORKER_PHASES:\n        status = \"RUNNING\" if worker[\"phase\"] != \"stopping\" else \"STOPPING\"\n    elif challenger is not None and checkpoint is not None:\n",
                  "    phase = worker[\"phase\"]\n    if phase in ACTIVE_WORKER_PHASES:\n        status = \"RUNNING\" if phase != \"stopping\" else \"STOPPING\"\n    elif phase == \"failed\":\n        status = \"FAILED\"\n    elif phase == \"paused\":\n        status = \"PAUSED\"\n    elif phase == \"paused_uncheckpointed\":\n        status = \"BLOCKED_UNCHECKPOINTED\"\n    elif phase == \"initialized\":\n        status = \"INITIALIZED_UNCHECKPOINTED\"\n    elif challenger is not None and checkpoint is not None:\n",
              ),
          ]
          for old, new in state_replacements:
              if state.count(old) != 1:
                  raise SystemExit(f"operator-state lifecycle replacement mismatch: {old[:140]!r}")
              state = state.replace(old, new)
          state_path.write_text(state, encoding="utf-8")

          bridge_path = Path("src/ethusdc_bot/ui/protocol_v3_dashboard_bridge.py")
          bridge = bridge_path.read_text(encoding="utf-8")
          bridge_replacements = [
              (
                  "from dataclasses import dataclass\n",
                  "from dataclasses import dataclass, field\n",
              ),
              (
                  "from ethusdc_bot.ui.protocol_v3_operator_state import (\n",
                  "from ethusdc_bot.ui.protocol_v3_lifecycle_status import (\n    ProtocolV3LifecycleStatus,\n    build_protocol_v3_lifecycle_status,\n)\nfrom ethusdc_bot.ui.protocol_v3_operator_state import (\n",
              ),
              (
                  "    research_progress: ProtocolV3ResearchProgress | None = None\n    resume_worker: ChallengerResumeWorker | None = None\n",
                  "    research_progress: ProtocolV3ResearchProgress | None = None\n    lifecycle_status: ProtocolV3LifecycleStatus = field(\n        default_factory=build_protocol_v3_lifecycle_status\n    )\n    resume_worker: ChallengerResumeWorker | None = None\n    challenger_report_opener: Callable[[], None] | None = None\n",
              ),
              (
                  "        research_progress=evidence.research_progress,\n        exchange_info_snapshot=evidence.exchange_info_snapshot,\n        resume_worker_available=evidence.resume_worker is not None,\n",
                  "        research_progress=evidence.research_progress,\n        exchange_info_snapshot=evidence.exchange_info_snapshot,\n        lifecycle_status=evidence.lifecycle_status,\n        resume_worker_available=evidence.resume_worker is not None,\n        report_open_available=evidence.challenger_report_opener is not None,\n",
              ),
              (
                  "    refit = root[\"current_refit\"]\n    challenger = root[\"research_challenger\"]\n",
                  "    refit = root[\"current_refit\"]\n    lifecycle = root[\"lifecycle_status\"]\n    challenger = root[\"research_challenger\"]\n",
              ),
              (
                  '        f"Aktuelle Ansicht: {root[\'operator_mode\']}",\n        "",\n        "DREI-MARKT-DATEN",\n',
                  '        f"Aktuelle Ansicht: {root[\'operator_mode\']}",\n        "",\n        "PROTOCOL-V3-LEBENSZYKLUS",\n        f"- Historisches Prozess-OOS: {lifecycle[\'process_oos\']}",\n        f"- Aktueller Monatsrefit: {lifecycle[\'current_refit\']}",\n        f"- Späteres Finalfenster: {lifecycle[\'final_window\']}",\n        f"- Kanonischer Shadow: {lifecycle[\'canonical_shadow\']}",\n        f"- Gründe: {_blockers(lifecycle.get(\'reason_codes\'))}",\n        "",\n        "DREI-MARKT-DATEN",\n',
              ),
              (
                  '            _button_line("Diagnose stoppen", buttons["challenger_stop"]),\n            _button_line("Paper", buttons["paper"]),\n',
                  '            _button_line("Diagnose stoppen", buttons["challenger_stop"]),\n            _button_line(\n                "Diagnosebericht öffnen", buttons["challenger_report_open"]\n            ),\n            _button_line("Paper", buttons["paper"]),\n',
              ),
              (
                  '            f"- Protocol-v3-Finalstatus: {meaning[\'protocol_v3_final_status\']}",\n',
                  '            f"- Protocol-v3-Finalstatus: {meaning[\'protocol_v3_final_status\']}",\n            f"- Finalfensterstatus: {meaning[\'final_window_status\']}",\n            f"- Kanonischer Shadowstatus: {meaning[\'canonical_shadow_status\']}",\n',
              ),
          ]
          for old, new in bridge_replacements:
              if bridge.count(old) != 1:
                  raise SystemExit(f"dashboard bridge lifecycle replacement mismatch: {old[:140]!r}")
              bridge = bridge.replace(old, new)
          bridge_path.write_text(bridge, encoding="utf-8")

          mixin_path = Path("src/ethusdc_bot/ui/protocol_v3_dashboard_mixin.py")
          mixin = mixin_path.read_text(encoding="utf-8")
          mixin_replacements = [
              (
                  "        self.protocol_v3_stop_button.pack(side=tk.LEFT, padx=4)\n        ttk.Label(\n",
                  "        self.protocol_v3_stop_button.pack(side=tk.LEFT, padx=4)\n        self.protocol_v3_report_button = ttk.Button(\n            bar,\n            text=\"Diagnosebericht öffnen\",\n            command=self.open_protocol_v3_challenger_report,\n            state=tk.DISABLED,\n        )\n        self.protocol_v3_report_button.pack(side=tk.LEFT, padx=4)\n        ttk.Label(\n",
              ),
              (
                  "        self.protocol_v3_stop_button.configure(\n            state=(\n                tk.NORMAL\n                if buttons[\"challenger_stop\"][\"enabled\"]\n                else tk.DISABLED\n            )\n        )\n",
                  "        self.protocol_v3_stop_button.configure(\n            state=(\n                tk.NORMAL\n                if buttons[\"challenger_stop\"][\"enabled\"]\n                else tk.DISABLED\n            )\n        )\n        self.protocol_v3_report_button.configure(\n            state=(\n                tk.NORMAL\n                if buttons[\"challenger_report_open\"][\"enabled\"]\n                else tk.DISABLED\n            )\n        )\n",
              ),
              (
                  "    def stop_protocol_v3_challenger(self) -> None:\n",
                  "    def open_protocol_v3_challenger_report(self) -> None:\n        evidence = self._protocol_v3_evidence_snapshot()\n        state = self._resolve_protocol_v3_operator_state(evidence)\n        button = state.to_dict()[\"buttons\"][\"challenger_report_open\"]\n        if button[\"enabled\"] is not True:\n            self._show_protocol_v3_blocked(\n                \"challenger_report_open\", \"Diagnosebericht\"\n            )\n            return\n        opener = evidence.challenger_report_opener\n        if opener is None:\n            self._show_protocol_v3_blocked(\n                \"challenger_report_open\", \"Diagnosebericht\"\n            )\n            return\n        try:\n            opener()\n        except Exception as exc:\n            self._log(f\"Diagnosebericht konnte nicht geöffnet werden: {exc}\")\n            messagebox.showerror(\"Bericht öffnen fehlgeschlagen\", str(exc))\n\n    def stop_protocol_v3_challenger(self) -> None:\n",
              ),
          ]
          for old, new in mixin_replacements:
              if mixin.count(old) != 1:
                  raise SystemExit(f"dashboard mixin lifecycle replacement mismatch: {old[:140]!r}")
              mixin = mixin.replace(old, new)
          mixin_path.write_text(mixin, encoding="utf-8")
      - name: Commit lifecycle UI integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/ethusdc_bot/ui/protocol_v3_operator_state.py \
            src/ethusdc_bot/ui/protocol_v3_dashboard_bridge.py \
            src/ethusdc_bot/ui/protocol_v3_dashboard_mixin.py
          git diff --cached --check
          git commit -m "Complete Protocol v3 lifecycle and report-open UI states"
          git push origin HEAD:codex/research-resume-and-ui-state-v1
