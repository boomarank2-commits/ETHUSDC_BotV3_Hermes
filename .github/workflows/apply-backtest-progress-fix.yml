                          f"Backtestfortschritt: {progress:.1f}% ({completed}/{maximum} Zyklen vollständig)"
                      )
                      self.task_var.set(f"Aktueller Schritt: {phase}")
          ''',
              '''            self.count_var.set(
                          f"Backtestfortschritt: {progress:.2f}% gesamt / "
                          f"{cycle_progress:.1f}% im aktiven Zyklus "
                          f"({completed}/{maximum} Zyklen vollständig)"
                      )
                      self.task_var.set(
                          f"Aktueller Schritt: {progress_message or phase}"
                      )
          ''',
          )
          dashboard_path = Path("src/ethusdc_bot/ui/dashboard.py")
          dashboard_text = dashboard_path.read_text(encoding="utf-8")
          if dashboard_text.count("self.progress_var.set(int(progress))") != 2:
              raise RuntimeError("dashboard.py: expected two integer progress assignments")
          dashboard_path.write_text(
              dashboard_text.replace("self.progress_var.set(int(progress))", "self.progress_var.set(progress)"),
              encoding="utf-8",
          )

          progress_test = '''from __future__ import annotations

          import json
          from pathlib import Path

          import pytest

          from ethusdc_bot.backtest.research_progress import ResearchProgressEmitter


          def test_progress_emitter_is_fractional_monotone_and_finishes_at_100(
              tmp_path: Path,
          ) -> None:
              emitter = ResearchProgressEmitter(tmp_path, "research_loop_example", 8)
              emitter.restore_completed(0)
              emitter.start_cycle(1)
              started = json.loads(emitter.path.read_text(encoding="utf-8"))
              assert 0.0 < started["overall_progress_pct"] < 1.0
              assert started["cycle_progress_pct"] == 2.0

              emitter.update_cycle(
                  1,
                  stage="training_validation",
                  completed_work_units=50,
                  total_work_units=100,
                  message="Kandidat 6/12 abgeschlossen",
              )
              halfway = json.loads(emitter.path.read_text(encoding="utf-8"))
              assert halfway["cycle_progress_pct"] == 50.0
              assert halfway["overall_progress_pct"] == pytest.approx(6.25)
              assert halfway["selection_behavior_changed"] is False
              assert halfway["uses_audit_or_holdout"] is False

              emitter.complete_cycle(1)
              cycle_done = json.loads(emitter.path.read_text(encoding="utf-8"))
              assert cycle_done["overall_progress_pct"] == pytest.approx(12.5)

              emitter.complete_run(stop_reason="selection_stagnation_3_cycles", cycles_executed=7)
              finished = json.loads(emitter.path.read_text(encoding="utf-8"))
              assert finished["status"] == "completed"
              assert finished["overall_progress_pct"] == 100.0
              assert not emitter.path.with_name(emitter.path.name + ".tmp").exists()
          '''
          Path("tests/unit/test_research_progress.py").write_text(progress_test, encoding="utf-8")

          display_test = '''from __future__ import annotations

          from datetime import UTC, datetime
          import json
          from pathlib import Path

          import pytest

          from ethusdc_bot.backtest.research_progress import ResearchProgressEmitter
          from ethusdc_bot.ui.backtest_display import collect_backtest_display_status


          def test_running_display_uses_granular_progress_file(tmp_path: Path) -> None:
              supervisor_run_id = "production_research_supervisor_20260713T180000Z"
              runner_run_id = "research_loop_supervisor_20260713T180000Z"
              checkpoint = {
                  "schema_version": 1,
                  "artifact_kind": "research_supervisor_checkpoint",
                  "run_id": supervisor_run_id,
                  "status": "running",
                  "started_at_utc": "2026-07-13T18:00:00Z",
                  "timestamp_utc": "2026-07-13T18:08:30Z",
                  "git_commit": "abc",
                  "git_branch": "test",
                  "max_cycles": 8,
                  "completed_cycle_count": 0,
                  "active_cycle": 1,
                  "cycles": [],
                  "report_json": None,
                  "audit_evaluated": False,
                  "final_holdout_evaluated": False,
                  "safety": {},
              }
              checkpoint_path = tmp_path / f"{supervisor_run_id}.checkpoint.json"
              checkpoint_path.write_text(json.dumps(checkpoint), encoding="utf-8")

              emitter = ResearchProgressEmitter(tmp_path, runner_run_id, 8)
              emitter.restore_completed(0)
              emitter.start_cycle(1)
              emitter.update_cycle(
                  1,
                  stage="training_validation",
                  completed_work_units=50,
                  total_work_units=100,
                  message="Training/Validation Kandidat 6/12 abgeschlossen",
              )

              status = collect_backtest_display_status(
                  tmp_path,
                  now_utc=datetime(2026, 7, 13, 18, 8, 30, tzinfo=UTC),
              )

              assert status["mode"] == "running"
              assert status["progress_pct"] == pytest.approx(6.25)
              assert status["cycle_progress_pct"] == pytest.approx(50.0)
              assert status["progress_stage"] == "training_validation"
              assert status["progress_message"] == (
                  "Training/Validation Kandidat 6/12 abgeschlossen"
              )
              assert status["progress_visible"] is True
          '''
          Path("tests/unit/test_backtest_progress_display.py").write_text(
              display_test, encoding="utf-8"
          )
          PY

      - name: Install project and test dependencies
        run: python -m pip install -e '.[test]'

      - name: Run focused progress tests
        run: python -m pytest tests/unit/test_research_progress.py tests/unit/test_backtest_progress_display.py -q

      - name: Run full test suite
        run: python -m pytest tests/ -q

      - name: Compile source tree
        run: python -m compileall -q src

      - name: Check whitespace
        run: git diff --check

      - name: Commit progress implementation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/ethusdc_bot/backtest/research_progress.py \
                  src/ethusdc_bot/backtest/research_loop_runner.py \
                  src/ethusdc_bot/ui/backtest_display.py \
                  src/ethusdc_bot/ui/operator_dashboard.py \
                  src/ethusdc_bot/ui/dashboard.py \
                  tests/unit/test_research_progress.py \
                  tests/unit/test_backtest_progress_display.py
          git commit -m 'Show granular live backtest progress'
          git push origin HEAD:codex/research-resume-and-ui-state-v1
