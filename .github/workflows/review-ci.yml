name: Review CI

on:
  pull_request:
    branches:
      - main
      - "agent/**"
      - "review/**"
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  task31-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply verified patch on real PR branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${GITHUB_HEAD_REF}" "${GITHUB_BASE_REF}"
          git checkout -B "${GITHUB_HEAD_REF}" "origin/${GITHUB_HEAD_REF}"
          python scripts/task31_fix_pipeline_final_serialization_once.py
      - name: Reverify Task 31 preregistration
        run: |
          python -m pip install -e . pytest
          python -m pytest -q tests/unit/test_protocol_v3_pipeline_final.py
          python -m compileall -q src/ethusdc_bot/protocol_v3/pipeline_final.py src/ethusdc_bot/protocol_v3/pipeline_final_api.py
          git diff --check
      - name: Commit verified block and restore normal CI
        shell: bash
        run: |
          set -euo pipefail
          git show "origin/${GITHUB_BASE_REF}:.github/workflows/review-ci.yml" > .github/workflows/review-ci.yml
          git rm -f --ignore-unmatch \
            .github/task31-serialization-trigger.txt \
            .github/workflows/task31-serialization-one-shot.yml \
            scripts/task31_fix_pipeline_final_serialization_once.py
          git add \
            .github/workflows/review-ci.yml \
            src/ethusdc_bot/protocol_v3/pipeline_final.py \
            tests/unit/test_protocol_v3_pipeline_final.py
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Complete pipeline-final preregistration and one-shot claim"
          git push origin HEAD:"${GITHUB_HEAD_REF}"
