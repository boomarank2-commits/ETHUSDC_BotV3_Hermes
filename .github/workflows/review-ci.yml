name: Review CI

on:
  pull_request:
    branches:
      - main
      - "agent/**"
      - "review/**"
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  task30-closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and tests
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Apply, validate, commit and push Task 30 closeout
        id: closeout
        shell: bash
        run: |
          set +e
          {
            set -euo pipefail
            git fetch --no-tags origin "${GITHUB_HEAD_REF}" "${GITHUB_BASE_REF}"
            git checkout -B "${GITHUB_HEAD_REF}" "origin/${GITHUB_HEAD_REF}"
            if [[ ! -f .github/task30-final-ready.txt ]]; then
              echo "Task 30 closeout inputs are not complete yet; no changes applied."
              exit 0
            fi
            python scripts/task30_closeout_once.py
            python -m pytest -q \
              tests/unit/test_protocol_v3_operator_state.py \
              tests/unit/test_research_challenger_controller.py \
              tests/unit/test_protocol_v3_dashboard_bridge.py \
              tests/unit/test_protocol_v3_operator_dashboard_integration.py \
              tests/unit/test_protocol_v3_dashboard_fail_closed.py \
              tests/unit/test_protocol_v3_lifecycle_status.py \
              tests/unit/test_protocol_v3_report_open_action.py
            python -m compileall -q src/ethusdc_bot/ui
            git diff --check
            git show "origin/${GITHUB_BASE_REF}:.github/workflows/review-ci.yml" > .github/workflows/review-ci.yml
            git rm -f --ignore-unmatch \
              .github/task30-closeout-trigger.txt \
              .github/task30-closeout-trigger-v2.txt \
              .github/task30-final-ready.txt \
              .github/workflows/task30-closeout-one-shot.yml \
              .github/workflows/task30-progress-one-shot.yml \
              scripts/task30_closeout_once.py \
              scripts/task30_handoff_content.md \
              scripts/task30_current_status_content.md \
              scripts/task31_next_action_content.md
            git add \
              .github/workflows/review-ci.yml \
              src/ethusdc_bot/ui/protocol_v3_operator_state.py \
              tests/unit/test_protocol_v3_operator_state.py \
              handoff/PROTOCOL_V3_TASK_30_2026-07-20.md \
              handoff/CURRENT_STATUS.md \
              handoff/NEXT_ACTION.md \
              docs/41_PROTOCOL_V3_IMPLEMENTATION_SEQUENCE.md
            git diff --cached --check
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Complete Protocol v3 Task 30 UI handoff"
            git push origin HEAD:"${GITHUB_HEAD_REF}"
          } > closeout-output.txt 2>&1
          status=$?
          cat closeout-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload closeout diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task30-closeout-${{ github.sha }}
          path: closeout-output.txt
          if-no-files-found: error
          retention-days: 14

      - name: Fail when closeout failed
        if: always()
        shell: bash
        run: test "${{ steps.closeout.outputs.status }}" -eq 0
