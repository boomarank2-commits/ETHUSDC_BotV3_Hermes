name: Review CI

on:
  push:
    branches:
      - "review/**"
      - "agent/**"
  pull_request:
    branches:
      - main
      - "agent/**"
      - "review/**"
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run full test suite and preserve diagnostics
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short > pytest-output.txt 2>&1
          status=$?
          cat pytest-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ github.sha }}
          path: pytest-output.txt
          if-no-files-found: error
          retention-days: 14

      - name: Compile source tree
        run: python -m compileall -q src

      - name: Validate PowerShell script syntax
        shell: pwsh
        run: |
          $files = @(Get-ChildItem -Path tools -Filter "*.ps1" -File -ErrorAction SilentlyContinue)
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$($file.FullName): $($_.Message)" }
              exit 1
            }
          }
          Write-Host "Validated $($files.Count) PowerShell script(s)."

      - name: Check committed whitespace errors
        shell: bash
        run: |
          if [[ -n "${GITHUB_BASE_REF}" ]]; then
            base_ref="${GITHUB_BASE_REF}"
          elif [[ "${GITHUB_REF_NAME}" == "review/backtest-ui-live-status-v1" ]]; then
            base_ref="codex/pr12-final-local-run"
          elif [[ "${GITHUB_REF_NAME}" == "review/context-research-integration-v1" ]]; then
            base_ref="review/research-checkpoints-context-v1"
          elif [[ "${GITHUB_REF_NAME}" == "review/research-checkpoints-context-v1" ]]; then
            base_ref="review/context-veto-engine-v1"
          elif [[ "${GITHUB_REF_NAME}" == "review/context-veto-engine-v1" ]]; then
            base_ref="review/context-data-alignment-v1"
          elif [[ "${GITHUB_REF_NAME}" == "review/context-data-alignment-v1" ]]; then
            base_ref="review/windows-production-research-runner-v1"
          elif [[ "${GITHUB_REF_NAME}" == "review/windows-production-research-runner-v1" ]]; then
            base_ref="review/search-frontier-v2"
          elif [[ "${GITHUB_REF_NAME}" == "review/search-frontier-v2" ]]; then
            base_ref="review/research-evidence-producers-v1"
          elif [[ "${GITHUB_REF_NAME}" == "review/research-evidence-producers-v1" ]]; then
            base_ref="review/pr4-final-alignment"
          elif [[ "${GITHUB_REF_NAME}" == "review/pr4-final-alignment" ]]; then
            base_ref="agent/portfolio-shadow-v1"
          elif [[ "${GITHUB_REF_NAME}" == review/* ]]; then
            base_ref="main"
          else
            base_ref="main"
          fi
          git fetch --no-tags origin "${base_ref}"
          git diff --check "origin/${base_ref}...HEAD"

      - name: Fail when pytest failed
        if: always()
        shell: bash
        run: test "${{ steps.pytest.outputs.status }}" -eq 0

      - name: Complete Protocol v3 Task 30 after green suite
        if: success() && hashFiles('.github/task30-closeout-trigger-v2.txt') != ''
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${GITHUB_HEAD_REF}" "${GITHUB_BASE_REF}"
          git checkout -B "${GITHUB_HEAD_REF}" "origin/${GITHUB_HEAD_REF}"
          python scripts/task30_closeout_once.py
          python -m pytest -q \
            tests/unit/test_protocol_v3_operator_state.py \
            tests/unit/test_research_challenger_controller.py \
            tests/unit/test_protocol_v3_dashboard_bridge.py \
            tests/unit/test_protocol_v3_operator_dashboard_integration.py \
            tests/unit/test_protocol_v3_dashboard_fail_closed.py \
            tests/unit/test_protocol_v3_lifecycle_status.py \
            tests/unit/test_protocol_v3_report_open_action.py
          python -m compileall -q src/ethusdc_bot/ui
          git diff --check
          git show "origin/${GITHUB_BASE_REF}:.github/workflows/review-ci.yml" > .github/workflows/review-ci.yml
          git rm -f --ignore-unmatch \
            .github/task30-closeout-trigger.txt \
            .github/task30-closeout-trigger-v2.txt \
            .github/workflows/task30-closeout-one-shot.yml \
            .github/workflows/task30-progress-one-shot.yml \
            scripts/task30_closeout_once.py
          git add \
            .github/workflows/review-ci.yml \
            src/ethusdc_bot/ui/protocol_v3_operator_state.py \
            tests/unit/test_protocol_v3_operator_state.py \
            handoff/PROTOCOL_V3_TASK_30_2026-07-20.md \
            handoff/CURRENT_STATUS.md \
            handoff/NEXT_ACTION.md \
            docs/41_PROTOCOL_V3_IMPLEMENTATION_SEQUENCE.md
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Complete Protocol v3 Task 30 UI handoff"
          git push origin HEAD:"${GITHUB_HEAD_REF}"
