name: Review CI

on:
  pull_request:
    branches:
      - main
      - "agent/**"
      - "review/**"
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  task31-progress-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply progress hardening in diagnostic checkout
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${GITHUB_HEAD_REF}"
          git checkout -B "${GITHUB_HEAD_REF}" "origin/${GITHUB_HEAD_REF}"
          python scripts/task31_harden_origin_progress_once.py
      - name: Install project
        run: python -m pip install -e . pytest
      - name: Run Task 31 progress tests and preserve diagnostics
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short \
            tests/unit/test_protocol_v3_pipeline_final.py \
            tests/unit/test_protocol_v3_pipeline_final_progress.py \
            tests/unit/test_protocol_v3_outer_origins.py \
            > task31-progress-pytest.txt 2>&1
          status=$?
          cat task31-progress-pytest.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Compile Task 31 progress modules
        run: |
          python -m compileall -q \
            src/ethusdc_bot/protocol_v3/outer_origins.py \
            src/ethusdc_bot/protocol_v3/pipeline_final.py \
            src/ethusdc_bot/protocol_v3/pipeline_final_progress.py \
            src/ethusdc_bot/protocol_v3/pipeline_final_progress_api.py
          git diff --check
      - name: Upload Task 31 progress diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task31-progress-${{ github.sha }}
          path: task31-progress-pytest.txt
          if-no-files-found: error
          retention-days: 14
      - name: Fail when Task 31 progress tests failed
        if: always()
        shell: bash
        run: test "${{ steps.pytest.outputs.status }}" -eq 0
