name: Review CI

on:
  push:
    branches:
      - codex/research-resume-and-ui-state-v1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  task31-final-report-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply, test, record, and restore normal CI
        shell: bash
        run: |
          set -u
          branch="codex/research-resume-and-ui-state-v1"
          git fetch --no-tags origin "$branch"
          git checkout -B "$branch" "origin/$branch"

          set +e
          python scripts/task31_bind_final_report_registration_once.py > task31-patch.txt 2>&1
          first_patch_status=$?
          second_patch_status=99
          if [[ $first_patch_status -eq 0 ]]; then
            python scripts/task31_upgrade_pipeline_final_contract_once.py >> task31-patch.txt 2>&1
            second_patch_status=$?
          fi
          install_status=99
          pytest_status=99
          compile_status=99
          whitespace_status=99
          if [[ $first_patch_status -eq 0 && $second_patch_status -eq 0 ]]; then
            python -m pip install -e . pytest > task31-install.txt 2>&1
            install_status=$?
          else
            : > task31-install.txt
          fi
          if [[ $install_status -eq 0 ]]; then
            python -m pytest -q --tb=short \
              tests/unit/test_protocol_v3_pipeline.py \
              tests/unit/test_protocol_v3_run_identity.py \
              tests/unit/test_protocol_v3_reporting.py \
              tests/unit/test_protocol_v3_pipeline_final.py \
              tests/unit/test_protocol_v3_pipeline_final_progress.py \
              tests/unit/test_protocol_v3_pipeline_final_checkpoint.py \
              tests/unit/test_protocol_v3_pipeline_final_attestation.py \
              tests/unit/test_protocol_v3_pipeline_final_report.py \
              tests/unit/test_protocol_v3_outer_origins.py \
              tests/unit/test_protocol_v3_outer_mtm_ledger.py \
              tests/unit/test_protocol_v3_monthly_quality_gate.py \
              tests/unit/test_protocol_v3_historical_diagnostics.py \
              > task31-final-report-pytest.txt 2>&1
            pytest_status=$?
            python -m compileall -q \
              src/ethusdc_bot/protocol_v3/pipeline_final.py \
              src/ethusdc_bot/protocol_v3/pipeline_final_attestation.py \
              src/ethusdc_bot/protocol_v3/pipeline_final_report.py \
              src/ethusdc_bot/protocol_v3/pipeline_final_report_api.py \
              > task31-compile.txt 2>&1
            compile_status=$?
            git diff --check > task31-whitespace.txt 2>&1
            whitespace_status=$?
          else
            : > task31-final-report-pytest.txt
            : > task31-compile.txt
            : > task31-whitespace.txt
          fi
          set -e

          result="FAIL"
          if [[ $first_patch_status -eq 0 && $second_patch_status -eq 0 && $install_status -eq 0 && $pytest_status -eq 0 && $compile_status -eq 0 && $whitespace_status -eq 0 ]]; then
            result="PASS"
          fi
          {
            echo "result=$result"
            echo "source_head=$GITHUB_SHA"
            echo "first_patch_status=$first_patch_status"
            echo "second_patch_status=$second_patch_status"
            echo "install_status=$install_status"
            echo "pytest_status=$pytest_status"
            echo "compile_status=$compile_status"
            echo "whitespace_status=$whitespace_status"
            echo "--- patch tail ---"
            tail -n 140 task31-patch.txt || true
            echo "--- pytest tail ---"
            tail -n 300 task31-final-report-pytest.txt || true
            echo "--- compile tail ---"
            tail -n 80 task31-compile.txt || true
            echo "--- whitespace tail ---"
            tail -n 80 task31-whitespace.txt || true
          } > .github/task31-final-report-diagnostic-result.txt

          git show ec873cc6605a445f34d3236625bc7d2ca28bb142:.github/workflows/review-ci.yml > .github/workflows/review-ci.yml
          if [[ "$result" == "PASS" ]]; then
            git rm -f \
              scripts/task31_bind_final_report_registration_once.py \
              scripts/task31_upgrade_pipeline_final_contract_once.py
            git add \
              .github/workflows/review-ci.yml \
              .github/task31-final-report-diagnostic-result.txt \
              configs/protocol_v3_pipeline_contract.json \
              configs/protocol_v3_pipeline_final_contract.json \
              src/ethusdc_bot/protocol_v3/pipeline_final.py \
              src/ethusdc_bot/protocol_v3/pipeline_final_report.py \
              tests/unit/test_protocol_v3_pipeline_final.py
            message="Open Task 31 pipeline-final report exactly once"
          else
            git restore \
              configs/protocol_v3_pipeline_contract.json \
              configs/protocol_v3_pipeline_final_contract.json \
              src/ethusdc_bot/protocol_v3/pipeline_final.py \
              src/ethusdc_bot/protocol_v3/pipeline_final_report.py \
              tests/unit/test_protocol_v3_pipeline_final.py
            git add .github/workflows/review-ci.yml .github/task31-final-report-diagnostic-result.txt
            message="Record failed Task 31 final report diagnostics"
          fi
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "$message"
          git push origin HEAD:"$branch"
