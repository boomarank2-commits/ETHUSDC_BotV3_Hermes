name: Review CI

on:
  push:
    branches:
      - codex/research-resume-and-ui-state-v1
  workflow_dispatch:

permissions:
  contents: read

jobs:
  task31-checkpoint-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project
        run: python -m pip install -e . pytest
      - name: Run Task 31 checkpoint tests and preserve diagnostics
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short \
            tests/unit/test_protocol_v3_pipeline_final.py \
            tests/unit/test_protocol_v3_pipeline_final_progress.py \
            tests/unit/test_protocol_v3_pipeline_final_checkpoint.py \
            tests/unit/test_protocol_v3_outer_origins.py \
            tests/unit/test_protocol_v3_research_challenger_checkpoint.py \
            > task31-checkpoint-pytest.txt 2>&1
          status=$?
          cat task31-checkpoint-pytest.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Compile Task 31 checkpoint modules
        run: |
          python -m compileall -q \
            src/ethusdc_bot/protocol_v3/pipeline_final.py \
            src/ethusdc_bot/protocol_v3/pipeline_final_progress.py \
            src/ethusdc_bot/protocol_v3/pipeline_final_checkpoint.py \
            src/ethusdc_bot/protocol_v3/pipeline_final_checkpoint_api.py
          git diff --check
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task31-checkpoint-${{ github.sha }}
          path: task31-checkpoint-pytest.txt
          if-no-files-found: error
          retention-days: 14
      - name: Fail when tests failed
        if: always()
        shell: bash
        run: test "${{ steps.pytest.outputs.status }}" -eq 0
