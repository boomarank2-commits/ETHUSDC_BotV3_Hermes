name: Review CI

on:
  pull_request:
    branches:
      - main
      - "agent/**"
      - "review/**"
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  task31-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply serialization patch in diagnostic checkout
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${GITHUB_HEAD_REF}"
          git checkout -B "${GITHUB_HEAD_REF}" "origin/${GITHUB_HEAD_REF}"
          python scripts/task31_fix_pipeline_final_serialization_once.py
      - name: Install project
        run: python -m pip install -e . pytest
      - name: Run Task 31 tests and preserve diagnostics
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short tests/unit/test_protocol_v3_pipeline_final.py > task31-pytest.txt 2>&1
          status=$?
          cat task31-pytest.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Compile Task 31 modules
        run: python -m compileall -q src/ethusdc_bot/protocol_v3/pipeline_final.py src/ethusdc_bot/protocol_v3/pipeline_final_api.py
      - name: Upload Task 31 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task31-preregistration-${{ github.sha }}
          path: task31-pytest.txt
          if-no-files-found: error
          retention-days: 14
      - name: Fail when Task 31 tests failed
        if: always()
        shell: bash
        run: test "${{ steps.pytest.outputs.status }}" -eq 0
