name: Review CI

on:
  push:
    branches:
      - codex/research-resume-and-ui-state-v1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  task31-full-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run full validation, record result, and restore normal CI
        shell: bash
        run: |
          set -u
          branch="codex/research-resume-and-ui-state-v1"
          base="codex/ui-responsiveness-and-next-iteration"
          git fetch --no-tags origin "$branch" "$base"
          git checkout -B "$branch" "origin/$branch"

          set +e
          python -m pip install -e ".[dev]" > task31-full-install.txt 2>&1
          install_status=$?
          pytest_status=99
          compile_status=99
          powershell_status=99
          whitespace_status=99
          if [[ $install_status -eq 0 ]]; then
            python -m pytest -q --tb=short > task31-full-pytest.txt 2>&1
            pytest_status=$?
            python -m compileall -q src > task31-full-compile.txt 2>&1
            compile_status=$?
            pwsh -NoProfile -Command '
              $files = @(Get-ChildItem -Path tools -Filter "*.ps1" -File -ErrorAction SilentlyContinue)
              foreach ($file in $files) {
                $tokens = $null
                $errors = $null
                [System.Management.Automation.Language.Parser]::ParseFile(
                  $file.FullName,
                  [ref]$tokens,
                  [ref]$errors
                ) | Out-Null
                if ($errors.Count -gt 0) {
                  $errors | ForEach-Object { Write-Error "$($file.FullName): $($_.Message)" }
                  exit 1
                }
              }
              Write-Host "Validated $($files.Count) PowerShell script(s)."
            ' > task31-full-powershell.txt 2>&1
            powershell_status=$?
            git diff --check "origin/$base...HEAD" > task31-full-whitespace.txt 2>&1
            whitespace_status=$?
          else
            : > task31-full-pytest.txt
            : > task31-full-compile.txt
            : > task31-full-powershell.txt
            : > task31-full-whitespace.txt
          fi
          set -e

          result="FAIL"
          if [[ $install_status -eq 0 && $pytest_status -eq 0 && $compile_status -eq 0 && $powershell_status -eq 0 && $whitespace_status -eq 0 ]]; then
            result="PASS"
          fi
          {
            echo "result=$result"
            echo "source_head=$GITHUB_SHA"
            echo "install_status=$install_status"
            echo "pytest_status=$pytest_status"
            echo "compile_status=$compile_status"
            echo "powershell_status=$powershell_status"
            echo "whitespace_status=$whitespace_status"
            echo "--- pytest tail ---"
            tail -n 220 task31-full-pytest.txt || true
            echo "--- compile tail ---"
            tail -n 60 task31-full-compile.txt || true
            echo "--- powershell tail ---"
            tail -n 60 task31-full-powershell.txt || true
            echo "--- whitespace tail ---"
            tail -n 80 task31-full-whitespace.txt || true
            echo "--- install tail ---"
            tail -n 40 task31-full-install.txt || true
          } > .github/task31-full-ci-result.txt

          git show ec873cc6605a445f34d3236625bc7d2ca28bb142:.github/workflows/review-ci.yml > .github/workflows/review-ci.yml
          git add .github/workflows/review-ci.yml .github/task31-full-ci-result.txt
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Record Task 31 full repository validation"
          git push origin HEAD:"$branch"
