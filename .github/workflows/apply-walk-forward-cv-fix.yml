name: Apply Walk-Forward CV fix

on:
  push:
    branches:
      - "review/research-evidence-producers-v1"
    paths:
      - ".github/workflows/apply-walk-forward-cv-fix.yml"
      - "tools/apply_walk_forward_cv_fix.py"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout research evidence branch
        uses: actions/checkout@v4
        with:
          ref: review/research-evidence-producers-v1
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply deterministic CV patch
        run: python tools/apply_walk_forward_cv_fix.py

      - name: Validate generated source
        run: |
          python -m compileall -q src tests
          git diff --check

      - name: Commit correction
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No CV changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ethusdc_bot/backtest/walk_forward.py
          git commit -m "Fix zero-mean Walk-Forward variation evidence"
          git push origin HEAD:review/research-evidence-producers-v1
