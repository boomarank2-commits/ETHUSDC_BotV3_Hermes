name: Apply research cycle checkpoints

on:
  push:
    branches:
      - "review/research-checkpoints-context-v1"
    paths:
      - ".github/workflows/apply-research-cycle-checkpoints.yml"
      - "tools/patch_research_cycle_checkpoints.py"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: review/research-checkpoints-context-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/patch_research_cycle_checkpoints.py
      - run: python -m compileall -q src && git diff --check
      - name: Commit cycle checkpoints
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ethusdc_bot/backtest/research_loop_runner.py tests/unit/test_research_loop_runner.py
          git commit -m "Persist validated research cycle checkpoints"
          git push origin HEAD:review/research-checkpoints-context-v1
