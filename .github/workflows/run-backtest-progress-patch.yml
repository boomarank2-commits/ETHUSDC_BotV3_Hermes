name: Apply tested backtest progress

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply exact reviewed patch
        run: python tools/apply_progress_patch.py

      - name: Preserve established operator text
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/ethusdc_bot/ui/operator_dashboard.py')
          text = path.read_text(encoding='utf-8')
          old = '        f"Fortschritt gesamt: {_number(status.get(\'progress_pct\'), 2)} %",\n'
          new = '        f"Fortschritt: {_number(status.get(\'progress_pct\'), 1)} %",\n'
          if text.count(old) != 1:
              raise RuntimeError('expected granular operator progress label exactly once')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Install project and tests
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'

      - name: Run full pytest and preserve diagnostics
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short > progress-patch-pytest.txt 2>&1
          status=$?
          cat progress-patch-pytest.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload progress patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: progress-patch-pytest
          path: progress-patch-pytest.txt

      - name: Compile patched source
        run: python -m compileall -q src

      - name: Check patched whitespace
        run: git diff --check

      - name: Confirm pytest result
        shell: bash
        run: test '${{ steps.pytest.outputs.status }}' -eq 0

      - name: Commit implementation and remove temporary helpers
        shell: bash
        run: |
          rm -f .github/workflows/apply-backtest-progress-fix.yml
          rm -f .github/workflows/run-backtest-progress-patch.yml
          rm -f tools/apply_progress_patch.py
          rm -f tools/apply_progress_patch.trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Show granular live backtest progress'
          git push origin HEAD:codex/research-resume-and-ui-state-v1
