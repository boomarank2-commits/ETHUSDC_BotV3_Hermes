name: Apply tested backtest progress

on:
  push:
    branches:
      - codex/research-resume-and-ui-state-v1

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply exact reviewed patch
        run: python tools/apply_progress_patch.py

      - name: Install project and tests
        run: python -m pip install -e '.[test]'

      - name: Run full validation
        shell: bash
        run: |
          python -m pytest tests/ -q
          python -m compileall -q src
          git diff --check

      - name: Commit implementation and remove temporary helpers
        shell: bash
        run: |
          rm -f .github/workflows/apply-backtest-progress-fix.yml
          rm -f .github/workflows/run-backtest-progress-patch.yml
          rm -f tools/apply_progress_patch.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Show granular live backtest progress'
          git push origin HEAD:codex/research-resume-and-ui-state-v1
