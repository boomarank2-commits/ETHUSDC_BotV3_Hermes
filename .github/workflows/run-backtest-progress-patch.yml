name: Apply tested backtest progress

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply exact reviewed patch
        run: python tools/apply_progress_patch.py

      - name: Install project and tests
        run: python -m pip install -e '.[test]'

      - name: Run full pytest and preserve diagnostics
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/ -q 2>&1 | tee progress-patch-pytest.txt

      - name: Upload progress patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: progress-patch-pytest
          path: progress-patch-pytest.txt

      - name: Compile patched source
        run: python -m compileall -q src

      - name: Check patched whitespace
        run: git diff --check

      - name: Confirm pytest result
        shell: bash
        run: test '${{ steps.pytest.outcome }}' = 'success'

      - name: Commit implementation and remove temporary helpers
        shell: bash
        run: |
          rm -f .github/workflows/apply-backtest-progress-fix.yml
          rm -f .github/workflows/run-backtest-progress-patch.yml
          rm -f tools/apply_progress_patch.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Show granular live backtest progress'
          git push origin HEAD:codex/research-resume-and-ui-state-v1
