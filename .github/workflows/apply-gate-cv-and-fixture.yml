name: Apply gate CV and fixture correction

on:
  push:
    branches:
      - "review/research-evidence-producers-v1"
    paths:
      - ".github/workflows/apply-gate-cv-and-fixture.yml"
      - "tools/apply_gate_cv_and_fixture_expectation.py"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: review/research-evidence-producers-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/apply_gate_cv_and_fixture_expectation.py
      - run: python -m compileall -q src tests && git diff --check
      - name: Commit gate and fixture correction
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ethusdc_bot/backtest/quality_gates.py \
                  tests/integration/test_research_loop_protocol_v2_smoke.py
          git commit -m "Align zero-mean gate evidence and no-trade fixture"
          git push origin HEAD:review/research-evidence-producers-v1
