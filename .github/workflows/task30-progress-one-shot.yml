name: Task 30 final progress one-shot
# Triggered only after the complete lifecycle/report-open CI passed.

on:
  push:
    branches:
      - codex/research-resume-and-ui-state-v1
    paths:
      - .github/workflows/task30-progress-one-shot.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/research-resume-and-ui-state-v1
          fetch-depth: 0
      - name: Mark Task 30 complete in canonical UI progress
        shell: python
        run: |
          from pathlib import Path

          state_path = Path("src/ethusdc_bot/ui/protocol_v3_operator_state.py")
          state = state_path.read_text(encoding="utf-8")
          replacements = [
              (
                  "PROTOCOL_V3_DONE_TASKS: Final = 29",
                  "PROTOCOL_V3_DONE_TASKS: Final = 30",
              ),
              (
                  '            "active_task": 30,\n            "active_task_status": "IN_PROGRESS",',
                  '            "active_task": 31,\n            "active_task_status": "NOT_STARTED",',
              ),
          ]
          for old, new in replacements:
              if state.count(old) != 1:
                  raise SystemExit(f"progress state replacement mismatch: {old!r}")
              state = state.replace(old, new)
          state_path.write_text(state, encoding="utf-8")

          test_path = Path("tests/unit/test_protocol_v3_operator_state.py")
          test = test_path.read_text(encoding="utf-8")
          old = '''    assert state["task_progress"] == {
        "done_tasks": 29,
        "total_tasks": 33,
        "progress_pct": 87.88,
        "active_task": 30,
        "active_task_status": "IN_PROGRESS",
    }
'''
          new = '''    assert state["task_progress"] == {
        "done_tasks": 30,
        "total_tasks": 33,
        "progress_pct": 90.91,
        "active_task": 31,
        "active_task_status": "NOT_STARTED",
    }
'''
          if test.count(old) != 1:
              raise SystemExit("progress test expectation mismatch")
          test_path.write_text(test.replace(old, new), encoding="utf-8")
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate final Task-30 UI progress
        run: |
          python -m pip install -e . pytest
          python -m pytest -q \
            tests/unit/test_protocol_v3_operator_state.py \
            tests/unit/test_protocol_v3_lifecycle_status.py \
            tests/unit/test_protocol_v3_dashboard_bridge.py \
            tests/unit/test_protocol_v3_operator_dashboard_integration.py
      - name: Commit final progress and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/ethusdc_bot/ui/protocol_v3_operator_state.py \
            tests/unit/test_protocol_v3_operator_state.py
          git rm .github/workflows/task30-progress-one-shot.yml
          git diff --cached --check
          git commit -m "Mark Protocol v3 Task 30 complete in UI progress"
          git push origin HEAD:codex/research-resume-and-ui-state-v1
