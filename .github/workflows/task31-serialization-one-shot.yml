name: Task 31 serialization one-shot

on:
  push:
    branches:
      - codex/research-resume-and-ui-state-v1
    paths:
      - .github/task31-serialization-trigger.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/research-resume-and-ui-state-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply serialization fix
        run: python scripts/task31_fix_pipeline_final_serialization_once.py
      - name: Install and test Task 31 preregistration
        run: |
          python -m pip install -e . pytest
          python -m pytest -q tests/unit/test_protocol_v3_pipeline_final.py
          python -m compileall -q src/ethusdc_bot/protocol_v3/pipeline_final.py src/ethusdc_bot/protocol_v3/pipeline_final_api.py
          git diff --check
      - name: Commit fix and remove temporary files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ethusdc_bot/protocol_v3/pipeline_final.py
          git rm .github/task31-serialization-trigger.txt
          git rm .github/workflows/task31-serialization-one-shot.yml
          git rm scripts/task31_fix_pipeline_final_serialization_once.py
          git diff --cached --check
          git commit -m "Fix pipeline-final canonical receipt serialization"
          git push origin HEAD:codex/research-resume-and-ui-state-v1
