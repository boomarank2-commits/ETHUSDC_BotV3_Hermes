name: Task 30 targeted acceptance one-shot

on:
  push:
    branches:
      - codex/research-resume-and-ui-state-v1
    paths:
      - .github/workflows/task30-targeted-one-shot.yml

permissions:
  contents: write

jobs:
  targeted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/research-resume-and-ui-state-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install project and tests
        run: python -m pip install -e . pytest
      - name: Run Task-30 targeted acceptance
        run: |
          python -m pytest -q \
            tests/unit/test_protocol_v3_operator_state.py \
            tests/unit/test_research_challenger_controller.py \
            tests/unit/test_protocol_v3_dashboard_bridge.py \
            tests/unit/test_protocol_v3_operator_dashboard_integration.py \
            tests/unit/test_protocol_v3_dashboard_fail_closed.py
          python -m compileall -q \
            src/ethusdc_bot/ui/protocol_v3_operator_state.py \
            src/ethusdc_bot/ui/research_challenger_controller.py \
            src/ethusdc_bot/ui/protocol_v3_dashboard_bridge.py \
            src/ethusdc_bot/ui/protocol_v3_dashboard_mixin.py \
            src/ethusdc_bot/ui/operator_dashboard.py
      - name: Remove one-shot workflow after green acceptance
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/task30-targeted-one-shot.yml
          git commit -m "Confirm targeted Protocol v3 Task 30 acceptance"
          git push origin HEAD:codex/research-resume-and-ui-state-v1
