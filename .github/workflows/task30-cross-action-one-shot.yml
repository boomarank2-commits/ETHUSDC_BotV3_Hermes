name: Task 30 cross action lock one-shot

on:
  push:
    branches:
      - codex/research-resume-and-ui-state-v1
    paths:
      - .github/workflows/task30-cross-action-one-shot.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/research-resume-and-ui-state-v1
          fetch-depth: 0
      - name: Lock conflicting existing UI actions in Protocol-v3 view
        shell: python
        run: |
          from pathlib import Path

          mixin_path = Path("src/ethusdc_bot/ui/protocol_v3_dashboard_mixin.py")
          mixin = mixin_path.read_text(encoding="utf-8")
          old = '''        self.protocol_v3_stop_button.configure(
            state=(
                tk.NORMAL
                if buttons["challenger_stop"]["enabled"]
                else tk.DISABLED
            )
        )
        tasks = root["task_progress"]
'''
          new = '''        self.protocol_v3_stop_button.configure(
            state=(
                tk.NORMAL
                if buttons["challenger_stop"]["enabled"]
                else tk.DISABLED
            )
        )
        # Protocol-v3 diagnosis is a separate order-free path. While this view
        # is active, older research/final/adoption/shadow starts remain visible
        # for orientation but cannot be triggered accidentally.
        for attribute in (
            "load_button",
            "check_button",
            "training_button",
            "final_evaluation_button",
            "adopt_shadow_button",
            "shadow_start_button",
        ):
            control = getattr(self, attribute, None)
            if control is not None:
                control.configure(state=tk.DISABLED)
        tasks = root["task_progress"]
'''
          if mixin.count(old) != 1:
              raise SystemExit("Protocol-v3 control application block mismatch")
          mixin_path.write_text(mixin.replace(old, new), encoding="utf-8")

          test_path = Path(
              "tests/unit/test_protocol_v3_operator_dashboard_integration.py"
          )
          test = test_path.read_text(encoding="utf-8")
          old = '''    app.protocol_v3_stop_button = _Button()
    app.bot_state_var = _Var()
'''
          new = '''    app.protocol_v3_stop_button = _Button()
    app.load_button = _Button()
    app.check_button = _Button()
    app.training_button = _Button()
    app.final_evaluation_button = _Button()
    app.adopt_shadow_button = _Button()
    app.shadow_start_button = _Button()
    app.bot_state_var = _Var()
'''
          if test.count(old) != 1:
              raise SystemExit("fake dashboard controls block mismatch")
          test = test.replace(old, new)
          old = '''    assert app.protocol_v3_stop_button.state == "disabled"
    assert "Bot-Start bleibt gesperrt" in app.bot_state_var.value
'''
          new = '''    assert app.protocol_v3_stop_button.state == "disabled"
    for control in (
        app.load_button,
        app.check_button,
        app.training_button,
        app.final_evaluation_button,
        app.adopt_shadow_button,
        app.shadow_start_button,
    ):
        assert control.state == "disabled"
    assert "Bot-Start bleibt gesperrt" in app.bot_state_var.value
'''
          if test.count(old) != 1:
              raise SystemExit("cross-action assertion block mismatch")
          test_path.write_text(test.replace(old, new), encoding="utf-8")
      - name: Commit and remove one-shot workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/ethusdc_bot/ui/protocol_v3_dashboard_mixin.py \
            tests/unit/test_protocol_v3_operator_dashboard_integration.py
          git rm .github/workflows/task30-cross-action-one-shot.yml
          git diff --cached --check
          git commit -m "Lock conflicting actions in Protocol v3 dashboard view"
          git push origin HEAD:codex/research-resume-and-ui-state-v1
