name: Apply selection evidence integration

on:
  push:
    branches:
      - "review/research-evidence-producers-v1"
    paths:
      - ".github/workflows/apply-selection-evidence-integration.yml"
      - "tools/apply_selection_evidence_integration.py"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout research evidence branch
        uses: actions/checkout@v4
        with:
          ref: review/research-evidence-producers-v1
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply deterministic integration patch
        run: python tools/apply_selection_evidence_integration.py

      - name: Validate generated source
        run: |
          python -m compileall -q src tests
          git diff --check

      - name: Commit integrated evidence pipeline
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No integration changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ethusdc_bot/backtest/selection_evidence.py \
                  src/ethusdc_bot/backtest/walk_forward.py \
                  src/ethusdc_bot/backtest/research_loop_runner.py \
                  tests/unit/test_research_loop_runner.py \
                  tests/integration/test_research_loop_protocol_v2_smoke.py
          git commit -m "Integrate complete selection evidence into research loop"
          git push origin HEAD:review/research-evidence-producers-v1
