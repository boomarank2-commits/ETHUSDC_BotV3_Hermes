name: Task 29 documentation one-shot

on:
  push:
    branches:
      - codex/research-resume-and-ui-state-v1
    paths:
      - .github/workflows/task29-docs-one-shot.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/research-resume-and-ui-state-v1
          fetch-depth: 0
      - name: Update central Protocol-v3 sequence
        shell: python
        run: |
          from pathlib import Path

          path = Path("docs/41_PROTOCOL_V3_IMPLEMENTATION_SEQUENCE.md")
          text = path.read_text(encoding="utf-8")
          replacements = [
              (
                  "Status: Protocol-v3-Vertragsgeneration 3.0.0 aktiv; Umsetzung 28/33 abgeschlossen",
                  "Status: Protocol-v3-Vertragsgeneration 3.0.0 aktiv; Umsetzung 29/33 abgeschlossen",
              ),
              (
                  "- Durch Aufgabe 15 wurde der Vertrag ohne Lockerung fortgeschrieben zu `protocol_v3_content_addressed_cache_and_transactional_resume_with_inner_selection_v3`; Fold- und Kandidatenslot sind nun beide gebunden.",
                  "- Durch Aufgabe 29 wurde der Vertrag versioniert zu `protocol_v3_content_addressed_cache_and_transactional_resume_with_inner_selection_and_production_candidates_v4`; Fold- und Kandidatenslot bleiben vollständig gebunden, echte Task-16→17→18-Produktionskandidaten sind zulässig und synthetische Fixtures bleiben blockiert.",
              ),
              (
                  "- Bis Aufgaben 16 bis 18 bleibt der einzige produktiv transaktionsfähige Zustand `NO_TRADE`.",
                  "- Aufgaben 16 bis 18 sind abgeschlossen. Seit Aufgabe 29 darf Task 13 neben `NO_TRADE` ausschließlich eine echte, vollständig validierte produktive `CANDIDATE`-Entscheidung binden; synthetische Evidenz bleibt unzulässig.",
              ),
              (
                  "- Transaktionsvertrag und Identität wurden zu v3 fortgeschrieben; alte Cache-/Resume-Stände ohne gebundene Auswahlentscheidung können nicht treffen. Das Kernmodell besitzt diese v3-Wahrheit selbst und lädt den JSON-Vertrag unabhängig von der Importreihenfolge.",
                  "- Transaktionsvertrag und Identität stehen nach Aufgabe 29 auf v4; alte Cache-/Resume-Stände ohne gebundene beziehungsweise produktionsgültige Auswahlentscheidung können nicht treffen. Das Kernmodell besitzt diese Wahrheit selbst und lädt den JSON-Vertrag unabhängig von der Importreihenfolge.",
              ),
              (
                  "### Aufgabe 29 – Orderfreien Research-Challenger-Shadow bauen\n\n**Status:** `NOT_STARTED`\n\nRetrospektive Challenger erhalten eigenen Reporttyp, Storage, Controller und Forward-Ledger, bleiben strikt orderfrei und können nicht als kanonischer Adoption-Shadow angenommen werden.",
                  "### Aufgabe 29 – Orderfreien Research-Challenger-Shadow bauen\n\n**Status:** `DONE_100`\n\nRetrospektive Challenger besitzen einen eigenen Reporttyp, erlaubten Storage-Root, orderfreien Controller und ein pipelinegebundenes Forward-Ledger, können aber niemals als kanonischer Adoption-Shadow angenommen werden.\n\n**Abnahme:**\n\n- Startprovenienz ist ausschließlich eine vollständig validierte Task-28-Entscheidung; Start ist manuell und erzeugt keinen rückwirkenden Forward-Backfill.\n- ETHUSDC ist einziges virtuelles Handelssymbol. BTCUSDC und ETHBTC bleiben exakt geschlossener, ausgerichteter Kontext ohne Orderrecht.\n- Die bestehende inkrementelle Task-8-Intrabar-/Execution-/Kostenlogik wird wiederverwendet; Ende eines Datenpräfixes liquidiert nicht künstlich und höchstens ein Lot bleibt erlaubt.\n- Warmup erzeugt keine Signale, Fills, PnL oder Ledgerzeilen. Forward-Einträge beginnen exakt an der manuellen Aktivierungsminute.\n- Das append-only SHA-256-Ledger bindet Pipelinegeneration, Task-28-Bundle, Snapshot, Kontext, Exchange Info, Execution, Kosten, Kerzeninhalt, virtuelle Events, Position, MTM und Closing Equity.\n- Eigene Task-11-Reports und Task-12-Artefakte speichern Trades, Daily MTM, Equity/Underwater und Diagnostik content-addressed; Rohkerzen werden nicht in Reports oder Checkpoints kopiert.\n- Task-13 speichert nur kompakte Receipts. Resume verlangt atomaren HEAD, vollständigen öffentlichen Präfix-Replay und bitgleichen State-/Ledger-/Cursor-/Safety-Nachweis.\n- Familien-, Feature-, Controller-, Execution- oder Pipelinewechsel erzeugt eine neue Generation, einen neuen Namespace und ein leeres Forward-Ledger.\n- Der Task-13-Vertrag v4 erlaubt echte vollständig validierte Task-16→17→18-Produktionskandidaten; Fixture-, Cross-Generation-, Hash-, Side-Effect-, Freshness-, Adoption- und Finalmanipulationen blockieren.\n- Sämtliche Ausgaben bleiben `NOT_FRESH`, `diagnostic_only`, nicht statistisch unterstützt, nicht adoptionfähig und nicht final. Orders, Paper, Testtrade, Live, private Endpunkte und API-Keys bleiben gesperrt.\n\n**Bericht:** `handoff/PROTOCOL_V3_TASK_29_2026-07-20.md`",
              ),
              (
                  "Protocol v3: Aufgabe 26/33 – Monthly Quality Gate, Stress und Pflichtmetriken – DONE_100\nProtocol v3: Aufgabe 27/33 – Hindsight-Benchmarks, Capture-Ratios und Bootstrap – DONE_100\nProtocol v3: Aufgabe 28/33 – Aktueller 730-Tage-Refit und Champion/Challenger/Cash – DONE_100\nGesamt: 28/33 DONE_100 = 84,85 %",
                  "Protocol v3: Aufgabe 27/33 – Hindsight-Benchmarks, Capture-Ratios und Bootstrap – DONE_100\nProtocol v3: Aufgabe 28/33 – Aktueller 730-Tage-Refit und Champion/Challenger/Cash – DONE_100\nProtocol v3: Aufgabe 29/33 – Orderfreier Research-Challenger-Shadow – DONE_100\nGesamt: 29/33 DONE_100 = 87,88 %",
              ),
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f"expected exactly one documentation replacement: {old[:120]!r}")
              text = text.replace(old, new)
          path.write_text(text, encoding="utf-8")
      - name: Commit sequence update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/41_PROTOCOL_V3_IMPLEMENTATION_SEQUENCE.md
          git diff --cached --check
          git commit -m "Mark Protocol v3 Task 29 done in sequence"
          git push origin HEAD:codex/research-resume-and-ui-state-v1
