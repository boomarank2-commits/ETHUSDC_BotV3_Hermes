name: Task 30 closeout one-shot

on:
  push:
    branches:
      - codex/research-resume-and-ui-state-v1
    paths:
      - .github/task30-closeout-trigger-v2.txt

permissions:
  contents: write

jobs:
  closeout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/research-resume-and-ui-state-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply Task 30 closeout
        run: python scripts/task30_closeout_once.py
      - name: Install and validate Task 30 closeout
        run: |
          python -m pip install -e . pytest
          python -m pytest -q \
            tests/unit/test_protocol_v3_operator_state.py \
            tests/unit/test_research_challenger_controller.py \
            tests/unit/test_protocol_v3_dashboard_bridge.py \
            tests/unit/test_protocol_v3_operator_dashboard_integration.py \
            tests/unit/test_protocol_v3_dashboard_fail_closed.py \
            tests/unit/test_protocol_v3_lifecycle_status.py \
            tests/unit/test_protocol_v3_report_open_action.py
          python -m compileall -q src/ethusdc_bot/ui
          git diff --check
      - name: Commit closeout and remove temporary files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/ethusdc_bot/ui/protocol_v3_operator_state.py \
            tests/unit/test_protocol_v3_operator_state.py \
            handoff/PROTOCOL_V3_TASK_30_2026-07-20.md \
            handoff/CURRENT_STATUS.md \
            handoff/NEXT_ACTION.md \
            docs/41_PROTOCOL_V3_IMPLEMENTATION_SEQUENCE.md
          rm -f .github/task30-closeout-trigger.txt
          rm -f .github/workflows/task30-progress-one-shot.yml
          git add -u .github/task30-closeout-trigger.txt .github/workflows/task30-progress-one-shot.yml || true
          git rm .github/task30-closeout-trigger-v2.txt
          git rm .github/workflows/task30-closeout-one-shot.yml
          git rm scripts/task30_closeout_once.py
          git diff --cached --check
          git commit -m "Complete Protocol v3 Task 30 UI handoff"
          git push origin HEAD:codex/research-resume-and-ui-state-v1
