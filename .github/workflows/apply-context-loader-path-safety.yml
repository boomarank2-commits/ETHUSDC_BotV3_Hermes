name: Apply context loader path safety

on:
  push:
    branches:
      - "review/context-data-alignment-v1"
    paths:
      - ".github/workflows/apply-context-loader-path-safety.yml"
      - "tools/apply_context_loader_path_safety.py"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: review/context-data-alignment-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/apply_context_loader_path_safety.py
      - run: python -m compileall -q src && git diff --check
      - name: Commit path safety correction
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ethusdc_bot/backtest/data_loader.py
          git commit -m "Preserve Windows path semantics in context loader"
          git push origin HEAD:review/context-data-alignment-v1
