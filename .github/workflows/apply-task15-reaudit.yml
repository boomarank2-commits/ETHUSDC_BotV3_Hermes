name: Apply Task 15 Reaudit

on:
  pull_request:
    branches:
      - main
      - "agent/**"
      - "review/**"
      - "codex/**"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/research-resume-and-ui-state-v1
          fetch-depth: 0

      - name: Apply locally verified Task 15 patch
        id: execute
        shell: bash
        run: |
          set +e
          bash -x <<'SCRIPT' > /tmp/task15-execution.log 2>&1
          set -euo pipefail
          test -f tools/task15_reaudit.part06
          cat tools/task15_reaudit.part{01..06} > /tmp/task15_reaudit.patch
          sha256sum /tmp/task15_reaudit.patch
          git apply --check --verbose /tmp/task15_reaudit.patch
          git apply --verbose /tmp/task15_reaudit.patch
          rm -f tools/task15_reaudit.part{01..06}
          rm -f .github/workflows/apply-task15-reaudit.yml
          python -m compileall -q src
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove Task 15 import-order patching"
          git push origin HEAD:codex/research-resume-and-ui-state-v1
          SCRIPT
          status=$?
          cat /tmp/task15-execution.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload execution diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task15-reaudit-execution-${{ github.sha }}
          path: /tmp/task15-execution.log
          if-no-files-found: error
          retention-days: 2

      - name: Fail when patch execution failed
        if: always()
        shell: bash
        run: test "${{ steps.execute.outputs.status }}" -eq 0
