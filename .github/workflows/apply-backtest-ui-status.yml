name: Apply backtest UI status integration

on:
  pull_request:
    branches:
      - codex/pr12-final-local-run

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.head_ref == 'review/backtest-ui-live-status-v1'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply deterministic UI patch
        run: python .github/patch_backtest_ui.py

      - name: Run focused tests
        run: |
          python -m pytest -q \
            tests/unit/test_backtest_display.py \
            tests/unit/test_ui_backtest_controller.py \
            tests/unit/test_dashboard_state.py \
            tests/unit/test_backtest_ui_mode.py \
            tests/unit/test_dashboard_no_forbidden_side_effects.py

      - name: Run full test suite
        run: python -m pytest -q

      - name: Compile and inspect diff
        run: |
          python -m compileall -q src
          git diff --check

      - name: Commit verified product changes
        run: |
          if git diff --quiet; then
            echo 'No product changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/ethusdc_bot/ui/dashboard.py src/ethusdc_bot/ui/backtest_display.py tests/unit/test_backtest_display.py
          git commit -m 'Show live and completed backtest status in existing UI'
          git push origin HEAD:${{ github.head_ref }}
