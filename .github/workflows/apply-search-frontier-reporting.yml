name: Apply Search Frontier reporting

on:
  push:
    branches:
      - "review/search-frontier-v2"
    paths:
      - ".github/workflows/apply-search-frontier-reporting.yml"
      - "tools/apply_search_frontier_reporting.py"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: review/search-frontier-v2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/apply_search_frontier_reporting.py
      - run: python -m compileall -q src tests && git diff --check
      - name: Commit Frontier report integration
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ethusdc_bot/backtest/research_loop_runner.py \
                  tests/integration/test_research_loop_protocol_v2_smoke.py
          git commit -m "Report deterministic Search Frontier v2 metadata"
          git push origin HEAD:review/search-frontier-v2
