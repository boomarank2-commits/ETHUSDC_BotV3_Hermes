name: Apply context bundle validation

on:
  push:
    branches:
      - "review/context-veto-engine-v1"
    paths:
      - ".github/workflows/apply-context-bundle-validation.yml"
      - "tools/patch_context_bundle_validation.py"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: review/context-veto-engine-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/patch_context_bundle_validation.py
      - run: python -m compileall -q src && git diff --check
      - name: Commit context bundle validation
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ethusdc_bot/backtest/context_features.py
          git commit -m "Validate all aligned context timelines in simulator"
          git push origin HEAD:review/context-veto-engine-v1
